<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phosphy Nexus Dashboard</title>
  <style>
    :root {
      --bg: #2d2e2b;
      --panel: #2b2c29;
      --line: #4a4a46;
      --line-strong: #5e5e5a;
      --text: #f1f1ee;
      --muted: #bbb9b2;
      --green: #29ce6a;
      --red: #ff6d75;
    }

    * { box-sizing: border-box; }
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: #242522; border-radius: 999px; }
    *::-webkit-scrollbar-thumb {
      background: #5d6259;
      border: 2px solid #242522;
      border-radius: 999px;
    }
    *::-webkit-scrollbar-thumb:hover { background: var(--green); }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #1f201e;
      color: var(--text);
      font-family: "Courier New", Consolas, monospace;
    }
    body { overflow: hidden; }
    button, input, textarea, select { font: inherit; color: inherit; }

    .stage {
      position: absolute;
      left: 0;
      top: 0;
      width: 1440px;
      height: 1200px;
      transform-origin: top left;
    }

    .dashboard {
      position: relative;
      width: 1440px;
      height: 1200px;
      background: var(--bg);
      border: 2px solid var(--line);
      border-radius: 17px;
      overflow: hidden;
    }

    .topbar {
      position: absolute;
      inset: 0 0 auto 0;
      height: 98px;
      display: flex;
      align-items: center;
      padding-left: 33px;
      border-bottom: 2px solid var(--line);
      background: #2d2e2b;
    }

    .online-dot {
      width: 16px;
      height: 16px;
      margin-right: 20px;
      border-radius: 50%;
      background: var(--red);
    }
    .online-dot.connected { background: var(--green); }

    .brand {
      font-size: 29px;
      font-weight: 700;
      line-height: 1;
    }

    .status {
      margin-left: 20px;
      color: var(--muted);
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }

    .connect {
      position: absolute;
      top: 13px;
      right: 32px;
      width: 184px;
      height: 70px;
      border: 2px solid var(--line-strong);
      border-radius: 16px;
      background: transparent;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 29px;
      font-weight: 700;
      line-height: 1;
    }

    .sidebar {
      position: absolute;
      left: 0;
      top: 98px;
      bottom: 360px;
      width: 441px;
      border-right: 2px solid var(--line);
      overflow: hidden;
    }

    .accounts-head {
      height: 66px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      padding: 0 26px 0 25px;
      border-bottom: 2px solid var(--line);
      color: var(--muted);
      font-size: 21px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .mini-action {
      height: 34px;
      min-width: 54px;
      padding: 0 10px;
      border: 2px solid var(--line-strong);
      border-radius: 12px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
    }
    .mini-action:hover { background: #383936; }

    .accounts-list {
      height: calc(100% - 66px);
      overflow: auto;
    }

    .account {
      height: 62px;
      display: grid;
      grid-template-columns: 29px 1fr;
      align-items: center;
      padding: 0 24px 0 25px;
      border: 0;
      border-bottom: 2px solid #41423e;
      background: transparent;
      width: 100%;
      text-align: left;
      cursor: pointer;
    }

    .account.selected { background: #363832; }
    .account .mini-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--green);
    }
    .account-name {
      color: var(--text);
      font-size: 22px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .connection-panel {
      position: absolute;
      left: 0;
      bottom: 360px;
      width: 441px;
      height: 192px;
      transform: translateY(100%);
      border-right: 2px solid var(--line);
      border-top: 2px solid var(--line);
      padding: 16px 22px;
      background: var(--bg);
    }

    .main {
      position: absolute;
      left: 441px;
      right: 0;
      top: 98px;
      bottom: 360px;
      padding: 27px 29px 0 29px;
      overflow: auto;
    }

    .card {
      border: 2px solid var(--line);
      border-radius: 15px;
      background: var(--panel);
      overflow: hidden;
      margin-bottom: 25px;
    }

    .card-title {
      height: 58px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding-left: 26px;
      border-bottom: 2px solid var(--line);
      color: var(--muted);
      font-size: 21px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .box-glyph {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 14px rgba(41, 206, 106, .65);
      color: transparent;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .card-body { padding: 20px 23px 22px 24px; }
    .command-row {
      display: grid;
      grid-template-columns: 1fr 170px;
      gap: 13px;
      margin-bottom: 16px;
    }

    .text-input, .select-box, .chat-input, .textarea, .form-input {
      border: 2px solid var(--line-strong);
      border-radius: 11px;
      background: #2c2d2a;
      color: var(--text);
      font-weight: 700;
      outline: none;
    }

    .text-input, .form-input {
      height: 72px;
      display: flex;
      align-items: center;
      padding: 0 22px;
      font-size: 24px;
      width: 100%;
    }

    .form-input.small {
      height: 46px;
      font-size: 18px;
      padding: 0 14px;
    }

    .btn {
      height: 72px;
      border: 2px solid var(--line-strong);
      border-radius: 16px;
      background: transparent;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 27px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover, .account:hover, .toggle:hover { background: #383936; }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .small-btn {
      width: 184px;
      height: 70px;
      font-size: 25px;
    }
    .small-btn.wide { width: 207px; }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
    }

    .toggle-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-height: 310px;
      overflow: auto;
      padding-right: 5px;
    }

    .toggle {
      min-height: 58px;
      border: 2px solid var(--line-strong);
      border-radius: 12px;
      background: #2c2d2a;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 9px;
      align-items: center;
      padding: 0 12px 0 14px;
      text-align: left;
      cursor: pointer;
    }

    .toggle span:first-child {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .switch {
      width: 46px;
      height: 25px;
      border: 2px solid var(--line-strong);
      border-radius: 999px;
      background: #1f201e;
      padding: 3px;
    }
    .switch::before {
      content: "";
      display: block;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--muted);
    }
    .switch.on { border-color: var(--green); }
    .switch.on::before {
      transform: translateX(20px);
      background: var(--green);
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px 14px;
      max-height: 300px;
      overflow: auto;
      padding-right: 5px;
    }

    .option label {
      display: block;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .action-button {
      min-height: 58px;
      border: 2px solid var(--line-strong);
      border-radius: 12px;
      background: #2c2d2a;
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      text-align: left;
      padding: 0 14px;
    }
    .action-button:hover { background: #383936; }

    .dropdown {
      position: relative;
      min-width: 0;
    }

    .dropdown-button {
      width: 100%;
      height: 46px;
      border: 2px solid var(--line-strong);
      border-radius: 11px;
      background: #2c2d2a;
      color: var(--text);
      cursor: pointer;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      font-size: 16px;
      font-weight: 700;
      text-align: left;
    }

    .dropdown-button span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .dropdown-button::after {
      content: "v";
      color: var(--green);
      font-size: 14px;
    }

    .dropdown.open .dropdown-button {
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(41, 206, 106, .22);
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      z-index: 10;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      max-height: 230px;
      overflow: auto;
      border: 2px solid var(--line-strong);
      border-radius: 12px;
      background: #252623;
      box-shadow: 0 18px 28px rgba(0, 0, 0, .35);
      padding: 6px;
    }

    .dropdown.open .dropdown-menu { display: block; }

    .dropdown-choice {
      width: 100%;
      min-height: 35px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      padding: 6px 8px;
      font-size: 14px;
      font-weight: 700;
      text-align: left;
    }
    .dropdown-choice:hover { background: #343631; }

    .dropdown-check {
      width: 14px;
      height: 14px;
      border: 2px solid var(--line-strong);
      border-radius: 4px;
    }
    .dropdown-choice.selected .dropdown-check {
      background: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 10px rgba(41, 206, 106, .55);
    }

    .textarea {
      height: 159px;
      padding: 22px 25px;
      font-size: 24px;
      line-height: 1.18;
      resize: none;
      width: 100%;
    }

    .execute-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 278px;
      gap: 13px;
    }

    .run-stack {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .run-btn {
      width: 278px;
      height: 70px;
      font-size: 25px;
    }

    .output {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 360px;
      border-top: 2px solid var(--line);
      background: var(--bg);
      overflow: hidden;
    }

    .output-head {
      height: 64px;
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      padding-left: 31px;
      border-bottom: 2px solid var(--line);
      color: var(--muted);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .clear {
      position: absolute;
      right: 28px;
      top: 13px;
      width: 91px;
      height: 38px;
      border: 2px solid var(--line-strong);
      border-radius: 18px;
      background: transparent;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
    }

    .terminal-tabs {
      height: 43px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 28px 0 28px;
      border-bottom: 2px solid var(--line);
      overflow-x: auto;
      overflow-y: hidden;
    }

    .terminal-tab {
      flex: 0 0 auto;
      height: 29px;
      min-width: 84px;
      max-width: 230px;
      padding: 0 12px;
      border: 2px solid var(--line-strong);
      border-radius: 12px 12px 0 0;
      background: #282925;
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .terminal-tab.active {
      color: var(--text);
      border-color: var(--green);
      box-shadow: inset 0 -2px 0 var(--green);
    }

    .log {
      height: 253px;
      padding: 16px 28px;
      overflow: auto;
      white-space: pre;
      color: #d8d5ce;
      font-family: Consolas, "Courier New", monospace;
      font-size: 17px;
      font-weight: 700;
    }
    .log-line {
      display: block;
      width: max-content;
      min-width: 100%;
      margin-bottom: 7px;
    }
    .log-line b { color: var(--green); }

    @media (prefers-reduced-motion: no-preference) {
      .stage { transition: transform 120ms ease-out; }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="dashboard" aria-label="Nexus Dashboard">
      <header class="topbar">
        <span class="online-dot" id="onlineDot" aria-hidden="true"></span>
        <div class="brand">Nexus Dashboard</div>
        <div class="status" id="statusText">Not connected</div>
        <button class="connect" id="connectBtn">Connect</button>
      </header>

      <aside class="sidebar">
        <div class="accounts-head">
          <span>ACCOUNTS</span>
          <button class="mini-action" id="selectAllTopBtn">All</button>
          <span id="accountCount">0</span>
        </div>
        <div class="accounts-list" id="accounts"></div>
      </aside>

      <section class="connection-panel">
        <input class="form-input small" id="relayUrl" placeholder="ws://localhost:8787/admin">
        <div style="height:10px"></div>
        <input class="form-input small" id="adminKey" type="password" placeholder="change-me">
        <div style="height:10px"></div>
        <button class="btn small-btn" id="selectAllBtn">Select all</button>
        <div style="height:10px"></div>
        <div style="color:var(--muted);font-size:15px;font-weight:700" id="selectedHint">Selected: all</div>
      </section>

      <main class="main">
        <section class="card">
          <div class="card-title"><span class="box-glyph">□</span><span>BROADCAST TO ALL</span></div>
          <div class="card-body">
            <div class="command-row">
              <input class="text-input" id="rawCommand" value="execute print('hello')">
              <button class="btn" id="sendRawBtn">Send all</button>
            </div>
            <div class="button-row">
              <button class="btn small-btn" data-command="rejoin">Rejoin all</button>
              <button class="btn small-btn" data-command="mute">Mute all</button>
              <button class="btn small-btn wide" data-command="unmute">Unmute all</button>
              <button class="btn small-btn wide" data-command="performance 8">Performance</button>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-title"><span class="box-glyph">□</span><span>PHOSPHY BUTTONS</span></div>
          <div class="card-body">
            <div class="button-grid" id="buttonGrid"></div>
          </div>
        </section>

        <section class="card">
          <div class="card-title"><span class="box-glyph">□</span><span>PHOSPHY TOGGLES</span></div>
          <div class="card-body">
            <div class="toggle-grid" id="toggleGrid"></div>
          </div>
        </section>

        <section class="card">
          <div class="card-title"><span class="box-glyph">□</span><span>PHOSPHY DROPDOWNS / INPUTS</span></div>
          <div class="card-body">
            <div class="option-grid" id="optionGrid"></div>
          </div>
        </section>

        <section class="card">
          <div class="card-title"><span class="box-glyph">□</span><span>EXECUTE LUA ON SELECTED</span></div>
          <div class="card-body execute-body">
            <textarea class="textarea" id="scriptBox">print("hello from dashboard")</textarea>
            <div class="run-stack">
              <button class="btn run-btn" id="runTargetBtn">Run on selected</button>
              <button class="btn run-btn" id="runAllBtn">Run on all</button>
            </div>
          </div>
        </section>
      </main>

      <section class="output">
        <div class="output-head">
          <span class="box-glyph">□</span>
          <span>OUTPUT</span>
          <button class="clear" id="clearLogBtn">Clear</button>
        </div>
        <div class="terminal-tabs" id="terminalTabs"></div>
        <div class="log" id="log">Connect to your server to see output</div>
      </section>
    </div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const state = { ws: null, accounts: [], selected: new Set(), logs: [], terminal: "all" };

    const buttons = [
      ["RedeemAllCodes", "Redeem Codes"], ["StartAutoProgression", "Start Progression"], ["RefreshState", "Refresh State"],
      ["unload", "Unload Phosphy"]
    ];

    const toggles = [
      ["ToggleAC", "Auto Click"], ["ToggleAutoRebirth", "Auto Rebirth"], ["ToggleAutoSpin", "Auto Spin"],
      ["ToggleConvertSpins", "Convert Spins"], ["ToggleAutoEvilSpin", "Auto Evil Spin"], ["ToggleAutoUseItems", "Auto Use Items"],
      ["ToggleAutoPotionCraft", "Auto Potion Craft"], ["ToggleAutoUpgrade", "Auto Upgrade"], ["ToggleAutoBuy", "Auto Buy"],
      ["ToggleClaimGifts", "Claim Gifts"], ["ToggleClaimDaily", "Claim Daily"], ["ToggleClaimAchievements", "Claim Achievements"],
      ["ToggleClaimChests", "Claim Chests"], ["ToggleClaimSeason", "Claim Season"], ["ToggleClaimQuests", "Claim Quests"],
      ["ToggleAutoBuyAuras", "Auto Buy Auras"], ["ToggleAutoEquipBestAura", "Equip Best Aura"], ["ToggleAutoBuyTapSkins", "Auto Buy TapSkins"],
      ["ToggleAutoEquipBestTapSkin", "Equip Best TapSkin"], ["ToggleAH", "Auto Hatch"], ["ToggleAutoEquipBest", "Auto Equip Best"],
      ["ToggleNoHatchAnim", "No Hatch Animation"], ["ToggleAutoClaimIndexReward", "Claim Index Reward"], ["ToggleAutoIndex", "Auto Index"],
      ["ToggleAutoGolden", "Auto Golden"], ["ToggleAutoDiamond", "Auto Diamond"], ["ToggleProgressionRebirth", "Progression Rebirth"],
      ["ToggleAutoAcceptTrade", "Auto Accept Trade"], ["ToggleAutoConfirmTrade", "Auto Confirm Trade"], ["ToggleAutoTradeTokens", "Trade All Tokens"],
      ["ToggleAutoTradeExclusiveEggs", "Trade All Eggs"], ["ToggleAutoTrade", "Auto Trade"],
      ["ToggleDisableAutoRejoin", "Disable Auto Rejoin"], ["TogglePerformance", "Performance"], ["ToggleFpsCap", "FPS Cap"],
      ["ToggleDisable3D", "Disable 3D"], ["ToggleAutoSettings", "Auto Settings"], ["ToggleWebhook", "Alert Webhook"],
      ["ToggleWebhookSummary", "Summary Webhook"], ["ToggleSummaryLeaderboards", "Summary Leaderboards"]
    ];

    const options = [
      ["RebirthTier", "Rebirth Tier"], ["InfRebirthDelay", "Inf Delay"], ["ItemUseSelect", "Items to Use"],
      ["PotionCraftSelect", "Potion Craft"], ["UpgradeSelect", "Upgrades"], ["MerchantItems", "Merchant Items"],
      ["AuraSelect", "Auras"], ["TapSkinSelect", "TapSkins"], ["EggSelect", "Egg"], ["IndexRaritySelect", "Index Rarities"],
      ["IndexIgnoreEggs", "Ignore Eggs"], ["IndexCraftVariants", "Craft Variants"], ["IndexDeleteRarities", "Delete Rarities"],
      ["IndexIgnorePets", "Ignore Pets"], ["GoldenPetSelect", "Golden Pets"], ["GoldenSuccessRate", "Golden Rate"],
      ["DiamondPetSelect", "Diamond Pets"], ["DiamondSuccessRate", "Diamond Rate"], ["TutorialLoadConfig", "Load Config"],
      ["ProgressionRebirthTarget", "Progression Target"], ["AutoAcceptTradeUsers", "Accept Users"], ["AutoTradeUsernames", "Trade Users"],
      ["FpsCapValue", "FPS Limit"], ["SettingsWantOn", "Settings ON"], ["SettingsWantOff", "Settings OFF"],
      ["WebhookURL", "Alert URL"], ["WebhookPingID", "Ping ID"], ["WebhookPingType", "Ping Type"],
      ["WebhookNotifyRarities", "Notify Rarities"], ["WebhookPingRarities", "Ping Rarities"], ["WebhookSummaryURL", "Summary URL"],
      ["SummaryMetrics", "Summary Metrics"], ["SummaryLeaderboards", "Leaderboard Places"], ["WebhookSummaryMinutes", "Summary Minutes"]
    ];

    const fallbackValues = {
      IndexCraftVariants: ["Golden", "Diamond"],
      GoldenSuccessRate: ["20%", "40%", "60%", "80%", "100%"],
      DiamondSuccessRate: ["20%", "40%", "60%", "80%", "100%"],
      WebhookPingType: ["None", "User", "Role"],
      SummaryMetrics: [
        "Eggs Hatched", "Rebirths Gained", "Gems Gained", "Tokens Gained", "Spins Gained", "Evil Spins Gained",
        "Items Net Change", "Total Clicks", "Total Rebirths", "Total Gems", "Total Tokens", "Total Eggs Hatched", "Total Time Played"
      ],
      SummaryLeaderboards: ["Total Gems", "Total Eggs", "Total Clicks", "Total Rebirths", "Time Played", "Robux"],
      IndexRaritySelect: ["Common", "Uncommon", "Rare", "Epic", "Legendary", "Mythic", "Exclusive", "Secret", "Celestial"],
      IndexDeleteRarities: ["Common", "Uncommon", "Rare", "Epic", "Legendary", "Mythic", "Exclusive", "Secret", "Celestial"],
      WebhookNotifyRarities: ["Common", "Uncommon", "Rare", "Epic", "Legendary", "Mythic", "Exclusive", "Secret", "Celestial"],
      WebhookPingRarities: ["Common", "Uncommon", "Rare", "Epic", "Legendary", "Mythic", "Exclusive", "Secret", "Celestial"]
    };

    function fitStage() {
      const scale = Math.min(window.innerWidth / 1440, window.innerHeight / 1200);
      stage.style.transform = `scale(${scale})`;
      stage.style.left = `${Math.max(0, (window.innerWidth - 1440 * scale) / 2)}px`;
      stage.style.top = `${Math.max(0, (window.innerHeight - 1200 * scale) / 2)}px`;
    }

    function q(id) { return document.getElementById(id); }
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }
    function targets() { return state.selected.size ? Array.from(state.selected) : "all"; }
    function selectedAccount() {
      const name = Array.from(state.selected)[0];
      return state.accounts.find(a => a.name === name) || state.accounts[0] || null;
    }
    function selectedPhosphy() {
      return selectedAccount()?.phosphyState || { Toggles: {}, Options: {}, OptionMeta: {} };
    }
    function send(payload) {
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
        addLog("ui", "Not connected");
        return;
      }
      state.ws.send(JSON.stringify(payload));
    }
    function addLog(source, content, time = Date.now()) {
      if (state.logs.length === 1 && state.logs[0].content === "Connect to your server to see output") state.logs = [];
      state.logs.push({ source, content, time });
      while (state.logs.length > 250) state.logs.shift();
      renderLogs();
    }
    function renderLogs() {
      const visibleLogs = state.terminal === "all"
        ? state.logs
        : state.logs.filter(line => line.source === state.terminal);
      if (!visibleLogs.length) {
        q("log").textContent = "Connect to your server to see output";
        return;
      }
      q("log").innerHTML = visibleLogs.slice(-120).map(line => {
        const t = new Date(line.time).toLocaleTimeString();
        return `<div class="log-line"><span style="color:#999690">${t}</span> <b>${escapeHtml(line.source)}</b> ${escapeHtml(line.content)}</div>`;
      }).join("");
    }
    function renderTerminalTabs() {
      const sources = ["all", ...state.accounts.map(acc => acc.name)];
      if (!sources.includes(state.terminal)) state.terminal = "all";
      q("terminalTabs").innerHTML = sources.map(source => {
        const label = source === "all" ? "All" : source;
        return `<button class="terminal-tab ${state.terminal === source ? "active" : ""}" data-terminal="${escapeHtml(source)}">${escapeHtml(label)}</button>`;
      }).join("");
    }
    function updateSelectedHint() {
      const count = state.selected.size;
      q("selectedHint").textContent = count ? `Selected: ${count}` : "Selected: all";
    }
    function setConnected(ok) {
      q("onlineDot").classList.toggle("connected", ok);
      q("statusText").textContent = ok ? "Connected" : "Not connected";
      q("connectBtn").textContent = ok ? "Disconnect" : "Connect";
    }
    function renderAccounts() {
      const liveNames = new Set(state.accounts.map(acc => acc.name));
      for (const name of Array.from(state.selected)) {
        if (!liveNames.has(name)) state.selected.delete(name);
      }
      q("accountCount").textContent = state.selected.size ? `${state.selected.size}/${state.accounts.length}` : state.accounts.length;
      if (!state.accounts.length) {
        q("accounts").innerHTML = `<div style="padding:25px;color:var(--muted);font-size:20px;font-weight:700">No accounts connected</div>`;
        renderTerminalTabs();
        updateSelectedHint();
        renderControls();
        return;
      }
      q("accounts").innerHTML = state.accounts.map(acc => {
        return `<button class="account ${state.selected.has(acc.name) ? "selected" : ""}" data-account="${escapeHtml(acc.name)}">
          <span class="mini-dot"></span><span class="account-name">${escapeHtml(acc.name)}</span>
        </button>`;
      }).join("");
      renderTerminalTabs();
      updateSelectedHint();
      renderControls();
    }
    function selectedKeys(value) {
      if (!value || typeof value !== "object") return [];
      if (Array.isArray(value)) return value.map(String);
      return Object.entries(value).filter(([, on]) => on === true).map(([key]) => key);
    }
    function inferValues(id, value, meta) {
      if (meta && Array.isArray(meta.Values) && meta.Values.length) return meta.Values.map(String);
      if (fallbackValues[id]) return fallbackValues[id];
      const keys = selectedKeys(value);
      if (keys.length) return keys;
      if (typeof value === "string" && value) return [value];
      return [];
    }
    function isMultiValue(value, meta) {
      return !!(meta && meta.Multi) || (!!value && typeof value === "object" && !Array.isArray(value));
    }
    function valueLabel(value, multi) {
      if (multi) {
        const keys = selectedKeys(value);
        if (!keys.length) return "None";
        return keys.length > 2 ? `${keys.slice(0, 2).join(", ")} +${keys.length - 2}` : keys.join(", ");
      }
      return value === undefined || value === null || value === "" ? "Select" : String(value);
    }
    function renderOption(id, label, phosphy) {
      const value = phosphy.Options && phosphy.Options[id] !== undefined ? phosphy.Options[id] : "";
      const meta = phosphy.OptionMeta && phosphy.OptionMeta[id];
      const values = inferValues(id, value, meta);
      const multi = isMultiValue(value, meta);

      if (!values.length || id === "InfRebirthDelay" || id === "FpsCapValue" || id === "WebhookSummaryMinutes" || id.endsWith("URL") || id.endsWith("Users") || id === "WebhookPingID" || id === "AutoTradeUsernames") {
        const text = typeof value === "object" ? JSON.stringify(value) : String(value ?? "");
        return `<div class="option"><label>${escapeHtml(label)}</label><input class="form-input small" data-option="${id}" value="${escapeHtml(text)}"></div>`;
      }

      const selected = new Set(multi ? selectedKeys(value) : [String(value)]);
      const choices = values.map(choice => {
        const on = selected.has(String(choice));
        return `<button class="dropdown-choice ${on ? "selected" : ""}" data-option-choice="${escapeHtml(id)}" data-choice-value="${escapeHtml(choice)}" data-multi="${multi ? "true" : "false"}">
          <span class="dropdown-check"></span><span>${escapeHtml(choice)}</span>
        </button>`;
      }).join("");

      return `<div class="option dropdown" data-dropdown="${escapeHtml(id)}">
        <label>${escapeHtml(label)}</label>
        <button class="dropdown-button" data-dropdown-toggle="${escapeHtml(id)}"><span>${escapeHtml(valueLabel(value, multi))}</span></button>
        <div class="dropdown-menu">${choices}</div>
      </div>`;
    }
    function renderControls() {
      const phosphy = selectedPhosphy();
      q("buttonGrid").innerHTML = buttons.map(([id, label]) => {
        return `<button class="action-button" data-action="${escapeHtml(id)}">${escapeHtml(label)}</button>`;
      }).join("");
      q("toggleGrid").innerHTML = toggles.map(([id, label]) => {
        const on = phosphy.Toggles && phosphy.Toggles[id] === true;
        return `<button class="toggle" data-toggle="${id}" data-value="${on ? "true" : "false"}">
          <span>${escapeHtml(label)}</span><span class="switch ${on ? "on" : ""}"></span>
        </button>`;
      }).join("");
      q("optionGrid").innerHTML = options.map(([id, label]) => renderOption(id, label, phosphy)).join("");
    }
    function connect() {
      if (state.ws && state.ws.readyState === WebSocket.OPEN) {
        state.ws.close();
        return;
      }
      const rawUrl = q("relayUrl").value.trim() || "ws://localhost:8787/admin";
      const key = encodeURIComponent(q("adminKey").value || "change-me");
      const ws = new WebSocket(`${rawUrl}${rawUrl.includes("?") ? "&" : "?"}key=${key}`);
      state.ws = ws;
      localStorage.setItem("nexusRelayUrl", rawUrl);
      localStorage.setItem("nexusAdminKey", q("adminKey").value || "change-me");
      ws.onopen = () => { setConnected(true); addLog("ui", "Connected to relay"); };
      ws.onclose = () => { setConnected(false); addLog("ui", "Disconnected from relay"); };
      ws.onerror = () => addLog("ui", "Relay connection error");
      ws.onmessage = event => {
        let msg;
        try { msg = JSON.parse(event.data); } catch { return; }
        if (msg.type === "hello") {
          state.accounts = msg.accounts || [];
          state.logs = msg.logs || [];
          renderAccounts();
          renderLogs();
        }
        if (msg.type === "accounts") {
          state.accounts = msg.accounts || [];
          renderAccounts();
        }
        if (msg.type === "log") addLog(msg.log.source, msg.log.content, msg.log.time);
        if (msg.type === "logs") {
          state.logs = msg.logs || [];
          renderLogs();
        }
      };
    }
    function parseValue(raw) {
      const text = raw.trim();
      if (!text) return "";
      if ((text.startsWith("{") && text.endsWith("}")) || (text.startsWith("[") && text.endsWith("]"))) {
        try { return JSON.parse(text); } catch {}
      }
      if (text === "true") return true;
      if (text === "false") return false;
      const n = Number(text);
      if (!Number.isNaN(n) && /^-?\d+(\.\d+)?$/.test(text)) return n;
      return text;
    }

    document.addEventListener("click", event => {
      const choice = event.target.closest("[data-option-choice]");
      if (choice) {
        const id = choice.dataset.optionChoice;
        const choiceValue = choice.dataset.choiceValue;
        const multi = choice.dataset.multi === "true";
        if (multi) {
          const current = selectedPhosphy().Options?.[id] || {};
          const next = {};
          if (current && typeof current === "object") {
            for (const [key, on] of Object.entries(current)) if (on === true) next[key] = true;
          }
          if (next[choiceValue]) delete next[choiceValue]; else next[choiceValue] = true;
          send({ type: "phosphy", targets: targets(), payload: { kind: "option", id, value: next } });
        } else {
          send({ type: "phosphy", targets: targets(), payload: { kind: "option", id, value: parseValue(choiceValue) } });
          choice.closest(".dropdown")?.classList.remove("open");
        }
        return;
      }

      const dropdownToggle = event.target.closest("[data-dropdown-toggle]");
      if (dropdownToggle) {
        const dropdown = dropdownToggle.closest(".dropdown");
        const open = dropdown.classList.contains("open");
        document.querySelectorAll(".dropdown.open").forEach(el => el.classList.remove("open"));
        dropdown.classList.toggle("open", !open);
        return;
      }

      if (!event.target.closest(".dropdown")) {
        document.querySelectorAll(".dropdown.open").forEach(el => el.classList.remove("open"));
      }

      const action = event.target.closest("[data-action]");
      if (action) {
        send({ type: "phosphy", targets: targets(), payload: { kind: "button", id: action.dataset.action } });
        return;
      }

      const account = event.target.closest("[data-account]");
      if (account) {
        const name = account.dataset.account;
        if (state.selected.has(name)) state.selected.delete(name); else state.selected.add(name);
        renderAccounts();
        return;
      }
      const command = event.target.closest("[data-command]");
      if (command) {
        send({ type: "command", targets: targets(), command: command.dataset.command });
        return;
      }
      const terminal = event.target.closest("[data-terminal]");
      if (terminal) {
        state.terminal = terminal.dataset.terminal;
        renderTerminalTabs();
        renderLogs();
        return;
      }
      const toggle = event.target.closest("[data-toggle]");
      if (toggle) {
        const value = toggle.dataset.value !== "true";
        send({ type: "phosphy", targets: targets(), payload: { kind: "toggle", id: toggle.dataset.toggle, value } });
      }
    });

    document.addEventListener("change", event => {
      const option = event.target.closest("[data-option]");
      if (option) send({ type: "phosphy", targets: targets(), payload: { kind: "option", id: option.dataset.option, value: parseValue(option.value) } });
    });

    q("connectBtn").onclick = connect;
    q("selectAllBtn").onclick = () => {
      if (state.selected.size === state.accounts.length) state.selected.clear();
      else state.accounts.forEach(a => state.selected.add(a.name));
      renderAccounts();
    };
    q("selectAllTopBtn").onclick = q("selectAllBtn").onclick;
    q("sendRawBtn").onclick = () => send({ type: "command", targets: "all", command: q("rawCommand").value });
    q("runTargetBtn").onclick = () => send({ type: "script", targets: targets(), script: q("scriptBox").value });
    q("runAllBtn").onclick = () => send({ type: "script", targets: "all", script: q("scriptBox").value });
    q("clearLogBtn").onclick = () => {
      if (state.ws?.readyState === WebSocket.OPEN) state.ws.send(JSON.stringify({ type: "clearLogs" }));
      state.logs = [];
      renderLogs();
    };

    q("relayUrl").value = localStorage.getItem("nexusRelayUrl") || "ws://localhost:8787/admin";
    q("adminKey").value = localStorage.getItem("nexusAdminKey") || "change-me";
    window.addEventListener("resize", fitStage);
    fitStage();
    renderAccounts();
    renderTerminalTabs();
    renderLogs();
  </script>
</body>
</html>
